# Usar PostgreSQL local com banco separado para testes
spring.datasource.url=jdbc:postgresql://localhost:5432/hs_iphones_test
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.clean-disabled=false

# JWT
jwt.secret=test-secret-key-that-must-be-at-least-256-bits-long-for-hmac
jwt.expiration=86400000

# CORS
cors.allowed-origins=http://localhost:5173

# Mail (desabilitado em testes - host fictício, e-mails não são enviados)
spring.mail.host=localhost
spring.mail.port=25
app.mail.enabled=false
app.mail.from=test@hsphones.com
app.frontend.url=http://localhost:5173
