# Database (Prod - via variĂ¡veis de ambiente)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.show-sql=false

# JWT (via variĂ¡vel de ambiente)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS (via variĂ¡vel de ambiente)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Swagger/OpenAPI desabilitado em produĂ§Ă£o
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Mail (SMTP - via variĂ¡veis de ambiente)
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.enabled=true
app.mail.from=${MAIL_FROM}
app.frontend.url=${FRONTEND_URL}
