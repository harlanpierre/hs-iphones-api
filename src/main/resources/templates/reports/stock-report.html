<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        body { font-family: Arial, Helvetica, sans-serif; font-size: 11px; color: #1e293b; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #2563eb; padding-bottom: 12px; }
        .header h1 { font-size: 18px; color: #2563eb; margin: 0 0 4px; }
        .header p { font-size: 10px; color: #64748b; margin: 2px 0; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
        th { background: #2563eb; color: #fff; padding: 6px 8px; text-align: left; font-size: 10px; }
        td { padding: 5px 8px; border-bottom: 1px solid #e2e8f0; font-size: 10px; }
        tr:nth-child(even) td { background: #f8fafc; }
        .low-stock td { background: #fef2f2 !important; color: #dc2626; }
        .summary { background: #f1f5f9; border-radius: 6px; padding: 12px 16px; margin-top: 12px; }
        .summary p { margin: 4px 0; font-size: 11px; }
        .summary strong { color: #2563eb; }
        .right { text-align: right; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Relatório de Estoque</h1>
        <p th:if="${category != null}" th:text="'Categoria: ' + ${category}">Categoria</p>
        <p th:if="${lowStockOnly}" style="color:#dc2626;">Somente itens com estoque baixo</p>
        <p th:text="'Gerado em: ' + ${generatedAt}">Data</p>
    </div>

    <table th:if="${!rows.isEmpty()}">
        <thead>
            <tr>
                <th>SKU</th>
                <th>Nome</th>
                <th>Categoria</th>
                <th>Status</th>
                <th class="right">Qtd</th>
                <th class="right">Est. Mín.</th>
                <th class="right">Preço Compra</th>
                <th class="right">Preço Venda</th>
                <th>Fornecedor</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="row : ${rows}" th:classappend="${row.estoqueMin != null and row.quantidade < row.estoqueMin} ? 'low-stock'">
                <td th:text="${row.sku ?: '-'}"></td>
                <td th:text="${row.nome}"></td>
                <td th:text="${row.categoria}"></td>
                <td th:text="${row.status}"></td>
                <td class="right" th:text="${row.quantidade}"></td>
                <td class="right" th:text="${row.estoqueMin ?: '-'}"></td>
                <td class="right" th:text="${row.precoCompra != null ? 'R$ ' + #numbers.formatDecimal(row.precoCompra, 1, 'POINT', 2, 'COMMA') : '-'}"></td>
                <td class="right" th:text="${row.precoVenda != null ? 'R$ ' + #numbers.formatDecimal(row.precoVenda, 1, 'POINT', 2, 'COMMA') : '-'}"></td>
                <td th:text="${row.fornecedor ?: '-'}"></td>
            </tr>
        </tbody>
    </table>

    <p th:if="${rows.isEmpty()}" style="text-align:center; color:#94a3b8;">Nenhum produto encontrado.</p>

    <div class="summary" th:if="${!rows.isEmpty()}">
        <p><strong>Total de produtos:</strong> <span th:text="${summary.totalProdutos}"></span></p>
        <p><strong>Valor total em estoque:</strong> R$ <span th:text="${#numbers.formatDecimal(summary.valorTotalEstoque, 1, 'POINT', 2, 'COMMA')}"></span></p>
    </div>
</body>
</html>
