<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        body { font-family: Arial, Helvetica, sans-serif; font-size: 11px; color: #1e293b; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #2563eb; padding-bottom: 12px; }
        .header h1 { font-size: 18px; color: #2563eb; margin: 0 0 4px; }
        .header p { font-size: 10px; color: #64748b; margin: 2px 0; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
        th { background: #2563eb; color: #fff; padding: 6px 8px; text-align: left; font-size: 10px; }
        td { padding: 5px 8px; border-bottom: 1px solid #e2e8f0; font-size: 10px; }
        tr:nth-child(even) td { background: #f8fafc; }
        .summary { background: #f1f5f9; border-radius: 6px; padding: 12px 16px; margin-top: 12px; }
        .summary p { margin: 4px 0; font-size: 11px; }
        .summary strong { color: #2563eb; }
        .right { text-align: right; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Relatório de Vendas</h1>
        <p th:text="'Período: ' + ${dateFrom} + ' a ' + ${dateTo}">Período</p>
        <p th:if="${status != null}" th:text="'Status: ' + ${status}">Status</p>
        <p th:text="'Gerado em: ' + ${generatedAt}">Data</p>
    </div>

    <table th:if="${!rows.isEmpty()}">
        <thead>
            <tr>
                <th>ID</th>
                <th>Data</th>
                <th>Cliente</th>
                <th>Vendedor</th>
                <th>Itens</th>
                <th class="right">Valor Bruto</th>
                <th class="right">Desconto</th>
                <th class="right">Valor Líquido</th>
                <th>Status</th>
                <th>Pagamento</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="row : ${rows}">
                <td th:text="${row.id}"></td>
                <td th:text="${row.data != null ? #temporals.format(row.data, 'dd/MM/yyyy HH:mm') : '-'}"></td>
                <td th:text="${row.cliente ?: '-'}"></td>
                <td th:text="${row.vendedor ?: '-'}"></td>
                <td th:text="${row.itens}"></td>
                <td class="right" th:text="${row.valorBruto != null ? 'R$ ' + #numbers.formatDecimal(row.valorBruto, 1, 'POINT', 2, 'COMMA') : '-'}"></td>
                <td class="right" th:text="${row.desconto != null ? 'R$ ' + #numbers.formatDecimal(row.desconto, 1, 'POINT', 2, 'COMMA') : '-'}"></td>
                <td class="right" th:text="${row.valorLiquido != null ? 'R$ ' + #numbers.formatDecimal(row.valorLiquido, 1, 'POINT', 2, 'COMMA') : '-'}"></td>
                <td th:text="${row.status}"></td>
                <td th:text="${row.formaPagamento ?: '-'}"></td>
            </tr>
        </tbody>
    </table>

    <p th:if="${rows.isEmpty()}" style="text-align:center; color:#94a3b8;">Nenhuma venda encontrada no período.</p>

    <div class="summary" th:if="${!rows.isEmpty()}">
        <p><strong>Total de vendas:</strong> <span th:text="${summary.totalVendas}"></span></p>
        <p><strong>Valor bruto total:</strong> R$ <span th:text="${#numbers.formatDecimal(summary.totalBruto, 1, 'POINT', 2, 'COMMA')}"></span></p>
        <p><strong>Valor líquido total:</strong> R$ <span th:text="${#numbers.formatDecimal(summary.totalLiquido, 1, 'POINT', 2, 'COMMA')}"></span></p>
    </div>
</body>
</html>
